<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
}
/* camada líquida no fundo */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 80%; /* menor que antes */
    height: 80%; /* menor que antes */
    border-radius: 50%;
    background: radial-gradient(circle, rgba(116,235,213,0.25), transparent 70%);
    filter: blur(100px);
    z-index: 0;
    pointer-events: none;
    animation: wave 14s infinite ease-in-out;
}

/* lado esquerdo */
body::before {
    top: -30%;
    left: -30%;
}

/* lado direito */
body::after {
    bottom: -30%;
    right: -30%;
    animation-duration: 18s;
}

.container {
    background-color: rgba(0, 0, 0, 0.6);
    padding: 40px 50px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

h1 {
    font-size: 30px;
    margin-bottom: 25px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #74ebd5;
}

.form-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
}

input[type="text"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
    transition: 0.2s;
}

input[type="text"]:focus {
    box-shadow: 0 0 8px #74ebd5;
}

.id-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.contador {
    font-size: 12px;
    color: #ffffff;
    text-shadow: 0 0 5px #00bfff, 0 0 10px #00bfff;
    min-width: 45px;
    text-align: right;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #74ebd5, #67d2c6);
    color: #000;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(90deg, #67d2c6, #5bb0a9);
}

ul {
    list-style: none;
    margin-top: 20px;
    max-height: 250px;
    overflow-y: auto;
    padding-left: 0;
}

ul li {
    padding: 10px 12px;
    margin-bottom: 8px;
    background-color: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

ul li:hover {
    background-color: rgba(255,255,255,0.25);
}

ul li button {
    background-color: #ff6b6b;
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

ul li button:hover {
    background-color: #ff4c4c;
}
</style>
</head>
<body>
<div class="container">
    <h1>Copa Brawl</h1>

    <div class="form-container">
        <input type="text" id="nick" placeholder="Digite seu nick">

        <div class="id-row">
            <input type="text" id="id" placeholder="Digite seu ID">
            <span id="contador" class="contador">0/64</span>
        </div>

        <button onclick="enviar()">Entrar</button>
    </div>

    <ul id="lista"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
