<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<!-- 🔥 ZOOM LIBERADO DE VERDADE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    overflow-x: auto; /* 👈 importante pro zoom */

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #04140c, #0b2e1a, #0f3d24);
}

/* 🌿 PARALLAX */
.parallax {
    position: fixed;
    inset: -50%;
    background: url("ThrophyVines.png") repeat;
    background-size: 220px;
    opacity: 0.08;
    pointer-events: none;

    transform: rotate(-25deg) scale(1.2);
}

/* WRAPPER */
.wrapper {
    display: flex;
    align-items: flex-start;
    gap: 50px;

    max-width: 95vw; /* 👈 evita travar zoom */
}

/* 🌟 LATERAL */
.side-info {
    color: white;
    max-width: 260px;
}

/* 🔴 BRAWLERS */
.brawlers-title {
    color: #ff3c3c;
    font-weight: bold;
    margin-bottom: 10px;

    text-shadow: 0 0 4px rgba(255,0,0,0.5);
}

/* 📦 ITEM */
.brawler {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

.brawler img {
    width: 40px;
    height: 40px;
}

/* TEXTO */
.brawler span {
    color: white;
    font-size: 14px;
}

/* 🏆 CAMPEÕES */
.champions {
    margin-top: 30px;
}

.side-info h2 {
    font-size: 18px;
    margin-bottom: 10px;
}

/* 🥇 GOLD */
.gold {
    font-weight: bold;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 6px rgba(255,215,0,0.6),
        0 0 12px rgba(255,215,0,0.4);
}

/* 🥈 SILVER */
.silver {
    background: linear-gradient(90deg, #c0c0c0, #e0e0e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        0 0 6px rgba(192,192,192,0.6),
        0 0 12px rgba(192,192,192,0.4);
}

/* 🧊 CARD */
.container {
    width: 370px;
    height: 520px;
    display: flex;
    flex-direction: column;

    background: rgba(0,0,0,0.75);
    padding: 40px;
    border-radius: 20px;
    color: #fff;

    box-shadow:
        0 0 20px rgba(56,255,106,0.2),
        0 0 40px rgba(56,255,106,0.15);
}

/* TÍTULO */
h1 {
    margin-bottom: 10px;
    font-size: 28px;
}

.title-white {
    color: #fff;
    text-shadow:
        0 0 6px rgba(255,255,255,0.5),
        0 0 12px rgba(255,255,255,0.3);
}

.title-green {
    color: #38ff6a;
    text-shadow:
        0 0 10px rgba(56,255,106,0.7),
        0 0 20px rgba(56,255,106,0.5);
}

/* CONTADOR */
#contador {
    color: #38ff6a;
    margin-bottom: 10px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 10px;
    border: none;
    background: #0b2e1a;
    color: #fff;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #38ff6a, #1ed760);
    cursor: pointer;
}

/* LISTA */
ul {
    margin-top: 10px;
    flex: 1;
    overflow-y: auto;
}

li {
    background: rgba(56,255,106,0.08);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="wrapper">

    <!-- 🌟 LADO -->
    <div class="side-info">

        <div class="brawlers-title">Brawlers do Campeonato:</div>

        <div class="brawler">
            <img src="Maisie.gif">
            <span>Maisie.gif : 1° Maisie</span>
        </div>

        <div class="brawler">
            <img src="Gray.gif">
            <span>Gray.gif : 2° Gray</span>
        </div>

        <div class="brawler">
            <img src="Colt.gif">
            <span>Colt.gif : 3° Colt</span>
        </div>

        <div class="champions">
            <h2>Campeões da Season 1:</h2>
            <p class="gold">#1 xp.Mateus 🥇</p>
            <p class="silver">#2 Bob_Marley 🥈</p>
        </div>

    </div>

    <!-- 🧊 CARD -->
    <div class="container">

        <h1>
            <span class="title-white">Copa Brawl:</span>
            <span class="title-green"> Season 2</span>
        </h1>

        <p id="contador">0/64</p>

        <input type="text" id="nick" placeholder="Nick">
        <input type="text" id="id" placeholder="ID">

        <button onclick="enviar()">Entrar</button>

        <ul id="lista"></ul>

    </div>

</div>

<script>
const parallax = document.getElementById("parallax")

let x = 0
let y = 0

function animar() {
    x += 0.15
    y -= 0.15

    parallax.style.transform =
        `translate(${x}px, ${y}px) rotate(-25deg) scale(1.2)`

    requestAnimationFrame(animar)
}

animar()
</script>

<script src="script.js"></script>

</body>
</html>
