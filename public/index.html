<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f2027;
    color: #fff;
    overflow: hidden;
    position: relative;
}

/* garante que o conteúdo fique na frente */
.container {
    position: relative;
    z-index: 2;
}

/* camada líquida no fundo */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 140%;
    height: 140%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,240,255,0.25), transparent 70%);
    filter: blur(100px);
    z-index: 0;
    pointer-events: none;
    animation: wave 14s infinite ease-in-out;
}

/* lado esquerdo */
body::before {
    top: -40%;
    left: -50%;
}

/* lado direito */
body::after {
    bottom: -40%;
    right: -50%;
    animation-duration: 18s;
}

/* movimento suave tipo água */
@keyframes wave {
    0% {
        transform: rotate(0deg) scale(1);
    }
    50% {
        transform: rotate(180deg) scale(1.15);
    }
    100% {
        transform: rotate(360deg) scale(1);
    }
}
    .parallax {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
}

/* base de todas as camadas */
.layer {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: url("https://cdn.discordapp.com/attachments/1385761618796740740/1486384850553409566/167_Sem_Titulo_20260325112201.png");
    
    /* repete a textura */
    background-repeat: repeat;

    /* tamanho pequeno = efeito textura */
    background-size: 60px;

    opacity: 0.05; /* controla intensidade */
}

/* camada mais lenta (fundo) */
.layer1 {
    animation: move1 60s linear infinite;
}

/* camada média */
.layer2 {
    animation: move2 40s linear infinite;
    opacity: 0.08;
}

/* camada rápida (frente) */
.layer3 {
    animation: move3 25s linear infinite;
    opacity: 0.12;
}

/* movimento diagonal ~348° */
@keyframes move1 {
    from {
        transform: translate(0, 0) rotate(348deg);
    }
    to {
        transform: translate(200px, -400px) rotate(348deg);
    }
}

@keyframes move2 {
    from {
        transform: translate(0, 0) rotate(348deg);
    }
    to {
        transform: translate(300px, -600px) rotate(348deg);
    }
}

@keyframes move3 {
    from {
        transform: translate(0, 0) rotate(348deg);
    }
    to {
        transform: translate(500px, -900px) rotate(348deg);
    }
}

.container {
    background-color: rgba(0, 0, 0, 0.6);
    padding: 40px 50px;
    border-radius: 20px;
    width: 360px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

h1 {
    font-size: 30px;
    margin-bottom: 25px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #74ebd5;
}

.form-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 25px;
}

input[type="text"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 15px;
    transition: 0.2s;
}

input[type="text"]:focus {
    box-shadow: 0 0 8px #74ebd5;
}

.id-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.contador {
    font-size: 12px;
    color: #ffffff;
    text-shadow: 0 0 5px #00bfff, 0 0 10px #00bfff;
    min-width: 45px;
    text-align: right;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #74ebd5, #67d2c6);
    color: #000;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(90deg, #67d2c6, #5bb0a9);
}

ul {
    list-style: none;
    margin-top: 20px;
    max-height: 250px;
    overflow-y: auto;
    padding-left: 0;
}

ul li {
    padding: 10px 12px;
    margin-bottom: 8px;
    background-color: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

ul li:hover {
    background-color: rgba(255,255,255,0.25);
}

ul li button {
    background-color: #ff6b6b;
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

ul li button:hover {
    background-color: #ff4c4c;
}
</style>
</head>
<body>
<div class="container">
    <h1>Copa Brawl</h1>

    <div class="form-container">
        <input type="text" id="nick" placeholder="Digite seu nick">

        <div class="id-row">
            <input type="text" id="id" placeholder="Digite seu ID">
            <span id="contador" class="contador">0/64</span>
        </div>

        <button onclick="enviar()">Entrar</button>
    </div>

    <ul id="lista"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
