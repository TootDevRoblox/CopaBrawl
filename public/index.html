<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🔥 BODY FIX MOBILE */
body {
    min-height: 100vh;
    overflow-x: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #04140c, #0b2e1a, #0f3d24);
}

/* 🌿 PARALLAX */
.parallax {
    position: fixed;
    inset: -50%;
    background: url("ThrophyVines.png") repeat;
    background-size: 220px;
    opacity: 0.08;
    pointer-events: none;

    transform: rotate(-25deg) scale(1.2);
    will-change: transform;
    backface-visibility: hidden;
}

/* WRAPPER */
.wrapper {
    display: flex;
    align-items: center;
    gap: 50px;
}

/* LATERAL */
.side-info {
    color: white;
    max-width: 220px;
}

.side-info h2 {
    margin-bottom: 10px;
}

/* OURO */
.gold {
    font-weight: bold;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* PRATA */
.silver {
    background: linear-gradient(90deg, #c0c0c0, #e0e0e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* CARD AREA */
.card-area {
    position: relative;
}

/* VINE */
.vine {
    position: absolute;
    inset: -40px;

    background: url("Details01.png") center no-repeat;
    background-size: 115%;
    opacity: 0.5;
    transform: scaleY(1.2);

    z-index: 2;
    pointer-events: none;
}

/* CONTAINER */
.container {
    position: relative;
    z-index: 1;

    width: 370px;
    height: 520px;
    display: flex;
    flex-direction: column;

    background: rgba(0,0,0,0.75);
    padding: 30px;
    border-radius: 20px;
    color: white;

    overflow: hidden;
}

/* LISTA */
ul {
    flex: 1;
    overflow-y: auto;
}

/* 🔥 RESPONSIVO */
@media (max-width: 768px) {
    .wrapper {
        flex-direction: column;
        gap: 20px;
    }

    .container {
        width: 90vw;
        height: auto;
    }

    .side-info {
        text-align: center;
    }

    .parallax {
        display: none; /* remove glitch no celular */
    }
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="wrapper">

    <div class="side-info">
        <h2>Campeões da Season 1:</h2>
        <p class="gold">#1 xp.Mateus 🥇</p>
        <p class="silver">#2 Bob_Marley 🥈</p>
    </div>

    <div class="card-area">

        <div class="vine"></div>

        <div class="container">

            <h1>Copa Brawl</h1>

            <input type="text" id="nick" placeholder="Nick">
            <input type="text" id="id" placeholder="ID">

            <button onclick="enviar()">Entrar</button>

            <ul id="lista"></ul>

        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
