<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #04140c, #0b2e1a, #145c37);
}

/* 🌿 PARALLAX */
.parallax {
    position: absolute;
    width: 220%;
    height: 220%;
    top: -60%;
    left: -60%;
    background: url("ThrophyVines.png") repeat;
    background-size: 220px;
    opacity: 0.05;
    pointer-events: none;
    transform: rotate(-25deg);
}

/* 🧊 CONTAINER */
.container {
    position: relative;
    z-index: 2;
    width: 370px;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.7);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    box-shadow: 0 0 40px rgba(0,255,120,0.2);
}

/* 🧱 TÍTULO BASE */
h1 {
    margin-bottom: 10px;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 1px;
}

.title-white {
    color: #ffffff;
    text-shadow:
        0 0 4px rgba(255,255,255,0.6),
        0 0 8px rgba(255,255,255,0.3);
}

/*  PARTE VERDE */
.title-green {
    color: #00ff88;
    text-shadow:
        0 0 8px #00ff88,
        0 0 16px rgba(0,255,136,0.6);
}

/* 🔢 CONTADOR */
#contador {
    color: #00ff88;
    font-weight: bold;
    margin-bottom: 15px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #0b2e1a;
    color: #fff;
    transition: 0.2s;
}

input::placeholder {
    color: #88c9a1;
}

input:focus {
    box-shadow: 0 0 12px #00ff88;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    color: #002b16;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    background: linear-gradient(90deg, #00cc66, #00994d);
    transform: scale(1.03);
}

/* LISTA */
ul {
    margin-top: 15px;
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
}

/* PLAYERS */
li {
    background: rgba(0,255,136,0.08);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    transition: 0.2s;
}

li:hover {
    background: rgba(0,255,136,0.2);
}

/* BOTÃO DELETE */
li button {
    background: #00ff88;
    color: #002b16;
    padding: 4px 8px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="container">

    <h1>
        <span class="title-white">Copa Brawl:</span>
        <span class="title-green"> Season 2</span>
    </h1>

    <p id="contador">0/64</p>

    <input type="text" id="nick" placeholder="Nick">
    <input type="text" id="id" placeholder="ID">
    <button onclick="enviar()">Entrar</button>

    <ul id="lista"></ul>

</div>

<script>
const parallax = document.getElementById("parallax")

let x = 0
let y = 0

function animar() {
    x += 0.4
    y -= 0.4

    parallax.style.transform = `translate(${x}px, ${y}px) rotate(-25deg)`
    requestAnimationFrame(animar)
}

animar()
</script>

<script src="script.js"></script>

</body>
</html>
