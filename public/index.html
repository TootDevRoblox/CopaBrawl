<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #04140c, #0b2e1a, #0f3d24);
}

/* 🌿 PARALLAX */
.parallax {
    position: absolute;
    width: 220%;
    height: 220%;
    top: -60%;
    left: -60%;
    background: url("ThrophyVines.png") repeat;
    background-size: 220px;
    opacity: 0.1;
    pointer-events: none;
    transform: rotate(-25deg);
}

/* 🧊 CONTAINER */
.container {
    position: relative;
    z-index: 2;
    width: 370px;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.75);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    box-shadow: 0 0 40px rgba(56,255,106,0.2);

    /* linhas fake conectando */
    background:
        linear-gradient(#38ff6a, #38ff6a) top left / 70px 6px no-repeat,
        linear-gradient(#38ff6a, #38ff6a) top right / 70px 6px no-repeat,
        linear-gradient(#38ff6a, #38ff6a) bottom left / 70px 6px no-repeat,
        linear-gradient(#38ff6a, #38ff6a) bottom right / 70px 6px no-repeat,
        rgba(0,0,0,0.75);
}

/* 🌿 VINHAS */
.container::before,
.container::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;
    pointer-events: none;
}

/* topo esquerdo */
.container::before {
    top: -15px;
    left: -15px;

    background:
        radial-gradient(circle at 30% 30%, #38ff6a 0%, #1ed760 40%, transparent 65%),
        radial-gradient(circle at 60% 60%, #1ed760 0%, #0f9d3a 50%, transparent 75%),
        conic-gradient(from 180deg, #38ff6a, #1ed760, #0f9d3a, transparent);

    border-top: 6px solid #38ff6a;
    border-left: 6px solid #38ff6a;

    border-radius: 30px;
    filter: drop-shadow(0 0 12px #38ff6a);

    transform: rotate(-18deg);
}

/* baixo direito */
.container::after {
    bottom: -15px;
    right: -15px;

    background:
        radial-gradient(circle at 70% 30%, #38ff6a 0%, #1ed760 40%, transparent 65%),
        radial-gradient(circle at 40% 70%, #1ed760 0%, #0f9d3a 50%, transparent 75%),
        conic-gradient(from 0deg, #38ff6a, #1ed760, #0f9d3a, transparent);

    border-bottom: 6px solid #38ff6a;
    border-right: 6px solid #38ff6a;

    border-radius: 30px;
    filter: drop-shadow(0 0 12px #38ff6a);

    transform: rotate(18deg);
}

/* 🧱 TÍTULO */
h1 {
    margin-bottom: 10px;
    font-size: 30px;
    font-weight: 900;
}

.title-white {
    color: #fff;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.title-green {
    color: #38ff6a;
    text-shadow: 0 0 12px #38ff6a;
}

/* 🔢 CONTADOR */
#contador {
    color: #38ff6a;
    font-weight: bold;
    margin-bottom: 15px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    background: #0b2e1a;
    color: #fff;
}

input::placeholder {
    color: #88c9a1;
}

input:focus {
    outline: none;
    box-shadow: 0 0 12px #38ff6a;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #38ff6a, #1ed760);
    color: #002b16;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
    background: linear-gradient(90deg, #1ed760, #0f9d3a);
}

/* LISTA */
ul {
    margin-top: 15px;
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
}

li {
    background: rgba(56,255,106,0.1);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
}

li:hover {
    background: rgba(56,255,106,0.2);
}

li button {
    background: #38ff6a;
    border: none;
    padding: 4px 8px;
    border-radius: 6px;
    color: #002b16;
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="container">

    <h1>
        <span class="title-white">Copa Brawl:</span>
        <span class="title-green"> Season 2</span>
    </h1>

    <p id="contador">0/64</p>

    <input type="text" id="nick" placeholder="Nick">
    <input type="text" id="id" placeholder="ID">

    <button onclick="enviar()">Entrar</button>

    <ul id="lista"></ul>

</div>

<script>
const parallax = document.getElementById("parallax")

let x = 0
let y = 0

function animar() {
    x += 0.4
    y -= 0.4
    parallax.style.transform = `translate(${x}px, ${y}px) rotate(-25deg)`
    requestAnimationFrame(animar)
}

animar()
</script>

<script src="script.js"></script>

</body>
</html>
