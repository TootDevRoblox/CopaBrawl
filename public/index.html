<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #04140c, #0b2e1a, #0f3d24);
}

.parallax {
    position: fixed;
    inset: -50%;
    background: url("ThrophyVines.png") repeat;
    background-size: 220px;
    opacity: 0.08;
    pointer-events: none;
    transform: rotate(-25deg) scale(1.2);
}

.wrapper {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    flex-wrap: wrap;
}

.side-info {
    color: white;
    width: 100%;
    max-width: 260px;
}

.brawlers-title {
    color: #ff3c3c;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 0 4px rgba(255,0,0,0.4);
}

.brawler {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

.brawler img {
    width: 42px;
    height: 42px;
}

.brawler span {
    color: white;
    font-size: 14px;
}

.champions {
    margin-top: 30px;
}

.side-info h2 {
    font-size: 18px;
    margin-bottom: 10px;
}

.gold {
    font-weight: bold;
    background: linear-gradient(90deg, #ffd700, #ffae00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        0 0 6px rgba(255,215,0,0.6),
        0 0 12px rgba(255,215,0,0.4);
}

.silver {
    background: linear-gradient(90deg, #c0c0c0, #e0e0e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
        0 0 6px rgba(192,192,192,0.6),
        0 0 12px rgba(192,192,192,0.4);
}

.card-area {
    position: relative;
}

.vine {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140%;
    height: 140%;
    transform: translate(-50%, -50%) scaleY(1.40);
    background: url("Details01.png") center no-repeat;
    background-size: contain;
    opacity: 0.7;
    z-index: 2;
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 370px;
    min-height: 520px;
    display: flex;
    flex-direction: column;
    background: rgba(0,0,0,0.75);
    padding: 40px;
    border-radius: 20px;
    color: #fff;
    box-shadow:
        0 0 20px rgba(56,255,106,0.2),
        0 0 40px rgba(56,255,106,0.15);
}

h1 {
    margin-bottom: 10px;
    font-size: 28px;
}

.title-white {
    color: #fff;
}

.title-green {
    color: #38ff6a;
}

#contador {
    color: #38ff6a;
    margin-bottom: 10px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border-radius: 10px;
    border: none;
    background: #0b2e1a;
    color: #fff;
    font-size: 16px;
}

input::placeholder {
    color: #88c9a1;
}

input:focus {
    box-shadow: 0 0 12px #38ff6a;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #38ff6a, #1ed760);
    color: #002b16;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
}

ul {
    margin-top: 10px;
    flex: 1;
    overflow-y: auto;
}

li {
    background: rgba(56,255,106,0.08);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
}

@media (max-width: 768px) {

    body {
        align-items: flex-start;
    }

    .wrapper {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .side-info {
        text-align: center;
        max-width: 100%;
    }

    .brawler {
        justify-content: center;
    }

    .container {
        padding: 25px;
    }

    h1 {
        font-size: 22px;
        text-align: center;
    }

    .vine {
        width: 135%;
        height: 135%;
        transform: translate(-50%, -50%) scaleY(1.35);
        opacity: 0.7;
        filter: none;
    }
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="wrapper">

    <div class="side-info">

        <div class="brawlers-title">Brawlers do Campeonato:</div>

        <div class="brawler">
            <img src="Maisie.gif">
            <span>1° Maisie</span>
        </div>

        <div class="brawler">
            <img src="Gray.gif">
            <span>2° Gray</span>
        </div>

        <div class="brawler">
            <img src="Colt.gif">
            <span>3° Colt</span>
        </div>

        <div class="champions">
            <h2>Campeões da Season 1:</h2>
            <p class="gold">#1 xp.Mateus 🥇</p>
            <p class="silver">#2 Bob_Marley 🥈</p>
        </div>

    </div>

    <div class="card-area">

        <div class="vine"></div>

        <div class="container">

            <h1>
                <span class="title-white">Copa Brawl:</span>
                <span class="title-green"> Season 2</span>
            </h1>

            <p id="contador">0/64</p>

            <input type="text" id="nick" placeholder="Nick">
            <input type="text" id="id" placeholder="ID">

            <button onclick="enviar()">Entrar</button>

            <ul id="lista"></ul>

        </div>

    </div>

</div>

<script>
const parallax = document.getElementById("parallax")

let x = 0
let y = 0

function animar() {
    x += 0.15
    y -= 0.15

    parallax.style.transform =
        `translate(${x}px, ${y}px) rotate(-25deg) scale(1.2)`

    requestAnimationFrame(animar)
}

animar()
</script>

<script src="script.js"></script>

</body>
</html>
