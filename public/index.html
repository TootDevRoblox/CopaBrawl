<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🔥 CENTRALIZAÇÃO */
body {
    height: 100vh;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #04140c, #0b2e1a, #0f3d24);
}

/* 🌿 PARALLAX */
.parallax {
    position: fixed;
    inset: -50%;
    background: url("ThrophyVines.png") repeat;
    background-size: 220px;
    opacity: 0.08;
    pointer-events: none;

    transform: rotate(-25deg) scale(1.2);
    will-change: transform;
}

/* WRAPPER */
.wrapper {
    position: relative;
}

/* 🌿 VINE (FORA DO CONTAINER) */
.vine {
    position: absolute;
    inset: -40px;

    background: url("Details01.png") center no-repeat;
    background-size: 110%;

    z-index: 2;
    pointer-events: none;

    filter: drop-shadow(0 0 12px rgba(56,255,106,0.25));
}

/* 🧊 CONTAINER */
.container {
    position: relative;
    z-index: 1;

    width: 370px;
    background: rgba(0,0,0,0.75);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #fff;

    box-shadow:
        0 0 20px rgba(56,255,106,0.2),
        0 0 40px rgba(56,255,106,0.15);

    overflow: hidden;
}

/* TÍTULO */
h1 {
    margin-bottom: 10px;
    font-size: 30px;
    font-weight: 900;
}

.title-white {
    color: #ffffff;
    text-shadow:
        0 0 6px rgba(255,255,255,0.6),
        0 0 12px rgba(255,255,255,0.3);
}

.title-green {
    color: #38ff6a;
    text-shadow:
        0 0 8px #38ff6a,
        0 0 16px rgba(56,255,106,0.6);
}

/* CONTADOR */
#contador {
    color: #38ff6a;
    font-weight: bold;
    margin-bottom: 15px;
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #0b2e1a;
    color: #fff;
}

input::placeholder {
    color: #88c9a1;
}

input:focus {
    box-shadow: 0 0 12px #38ff6a;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #38ff6a, #1ed760);
    color: #002b16;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    background: linear-gradient(90deg, #1ed760, #0f9d3a);
    transform: scale(1.03);
}

/* LISTA */
ul {
    margin-top: 15px;
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
}

li {
    background: rgba(56,255,106,0.08);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
}

li:hover {
    background: rgba(56,255,106,0.2);
}

li button {
    background: #38ff6a;
    color: #002b16;
    padding: 4px 8px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="wrapper">

    <!-- 🌿 VINE LIVRE -->
    <div class="vine"></div>

    <div class="container">

        <h1>
            <span class="title-white">Copa Brawl:</span>
            <span class="title-green"> Season 2</span>
        </h1>

        <p id="contador">0/64</p>

        <input type="text" id="nick" placeholder="Nick">
        <input type="text" id="id" placeholder="ID">

        <button onclick="enviar()">Entrar</button>

        <ul id="lista"></ul>

    </div>
</div>

<script>
const parallax = document.getElementById("parallax")

let x = 0
let y = 0

function animar() {
    x += 0.15
    y -= 0.15

    parallax.style.transform =
        `translate(${x}px, ${y}px) rotate(-25deg) scale(1.2)`

    requestAnimationFrame(animar)
}

animar()
</script>

<script src="script.js"></script>

</body>
</html>
