<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa Brawl</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
}

/* 🌿 PARALLAX BACKGROUND */
.parallax {
    position: absolute;
    width: 220%;
    height: 220%;
    top: -60%;
    left: -60%;

    background: url("ThrophyVines.png") repeat;

    background-size: 220px; /* 👈 tamanho da imagem */
    background-position: 0 0;

    opacity: 0.18;
    pointer-events: none;

    transform: rotate(-25deg); /* 🔥 deixa diagonal */
}

/* 🧊 CONTAINER */
.container {
    position: relative;
    z-index: 2;
    width: 360px;
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h1 {
    color: #74ebd5;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #74ebd5, #67d2c6);
    font-weight: bold;
    cursor: pointer;
}

ul {
    margin-top: 15px;
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
}

li {
    background: rgba(255,255,255,0.15);
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<div class="parallax" id="parallax"></div>

<div class="container">
    <h1>Copa Brawl</h1>

    <input type="text" id="nick" placeholder="Nick">
    <input type="text" id="id" placeholder="ID">
    <button onclick="enviar()">Entrar</button>

    <ul id="lista"></ul>
</div>

<script>
const parallax = document.getElementById("parallax")

let x = 0
let y = 0

function animar() {
    x += 0.4   // 👉 BEM MAIS RÁPIDO
    y -= 0.4   // 👉 diagonal ↗

    parallax.style.transform = `translate(${x}px, ${y}px) rotate(-25deg)`

    requestAnimationFrame(animar)
}

animar()
</script>

<script src="script.js"></script>

</body>
</html>
